name: CI — Build, push et deploy

on:
  push:
    branches: ['feat/deploy-Image']

env:
  REGISTRY: ghcr.io

jobs:

  # ── Tests ──────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    env:
      MISTRAL_API_KEY: dummy-key-for-tests
      POSTGRES_PASSWORD: dummy-password
      POSTGRES_USER: rag_user
      POSTGRES_DB: rag
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer uv
        uses: astral-sh/setup-uv@v3

      - name: Installer les dépendances
        working-directory: ./api
        run: uv sync --frozen --extra dev

      - name: Lancer les tests unitaires
        working-directory: ./api
        run: uv run pytest tests/unit/ -v

  # ── Build et push API ──────────────────────────────────────
  build-and-push-api:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connexion à GHCR
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées API
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/umbertoEmonds/vps_rag-api

      - name: Build et push API
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: ./api
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Build et push Frontend ─────────────────────────────────
  build-and-push-frontend:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connexion à GHCR
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Frontend
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/umbertoEmonds/vps_rag-frontend

      - name: Build et push Frontend
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: ./frontend
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  # ── Déploiement sur le VPS ─────────────────────────────────
# ── Déploiement sur le VPS ─────────────────────────────────
  deploy:
    needs: [build-and-push-api, build-and-push-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Envoyer config sur le VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.yml,api/data/db/init"
          target: "~/vps_rag"

      - name: Déployer sur le VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Créer le .env API
            mkdir -p ~/vps_rag/api
            cat > ~/vps_rag/api/.env << 'EOF'
            # Mistral AI
            MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}

            # PostgreSQL
            POSTGRES_HOST=localhost
            POSTGRES_PORT=5432
            POSTGRES_DB=rag
            POSTGRES_USER=rag_user
            POSTGRES_PASSWORD=rag_password
            POSTGRES_SCHEMA=rag

            # Application
            APP_ENV=development
            APP_LOG_LEVEL=INFO
            APP_PORT=8000

            # RAG tuning
            CHUNK_SIZE=512
            CHUNK_OVERLAP=64
            RETRIEVAL_TOP_K=5

            # CORS
            CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:4173
            EOF

            # Créer le .env racine
            cat > ~/vps_rag/.env << 'EOF'
            POSTGRES_HOST=localhost
            POSTGRES_PORT=5432
            POSTGRES_DB=rag
            POSTGRES_USER=rag_user
            POSTGRES_PASSWORD=rag_password
            POSTGRES_SCHEMA=rag
            EOF

            # Créer le network proxy (si pas déjà fait)
            docker network create proxy 2>/dev/null || true

            cd ~/vps_rag
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps
            docker logout ghcr.io
