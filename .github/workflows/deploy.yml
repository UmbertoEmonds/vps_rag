name: CI/CD Production Deployment

on:
  push:
    branches:
      - main # Déclenche désormais le déploiement sur chaque push sur main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. Étape de Test de l'API
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        working-directory: ./api
        run: |
          uv sync --frozen --all-extras

      - name: Run API Tests
        working-directory: ./api
        run: |
          echo "Exécution des tests de l'API..."
          uv run pytest

  # 2. Étape de Test du Frontend
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install Frontend dependencies
        working-directory: ./frontend
        run: |
          uv sync --frozen

      - name: Run Frontend Tests
        working-directory: ./frontend
        run: |
          echo "Exécution des tests du Frontend..."
          uv run pytest

  # 3. Étape de Build et Publication sur GHCR
  build-and-push:
    # Le build ne commence que si les tests API ET Frontend passent avec succès
    needs: [test-api, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 4. Étape de Déploiement automatique sur le VPS
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/app-ia
            # Met à jour l'image de ton application modifiée
            docker compose pull mon-application-ia
            # Relance l'application en arrière-plan de manière transparente
            docker compose up -d mon-application-ia
            # Nettoie les anciennes images résiduelles pour préserver l'espace disque du VPS
            docker image prune -f
