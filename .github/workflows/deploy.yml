name: CI/CD Production Deployment

on:
  push:
    tags:
      - 'v*.*.*' # Déclenche la pipeline uniquement lorsqu'on pousse un tag de version (ex: v1.0.0)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. Étape de Tests
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (ou Node/Go selon votre app)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies & Run Tests
        run: |
          pip install -r requirements.txt
          pytest # Modifiez cette ligne selon votre framework de test existant

  # 2. Étape de Build et Publication sur GHCR
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: actions/privileged-session@v2 # Version sécurisée ou standard :
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Secret automatique fourni par GitHub Actions

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}         # Correction pour utiliser l'env
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 3. Étape de Déploiement automatique sur le VPS
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/app-ia
            # Mettre à jour l'image Docker depuis la registry
            docker compose pull mon-application-ia
            # Relancer le conteneur mis à jour sans coupure pour les autres services
            docker compose up -d mon-application-ia
            # Nettoyer les anciennes images inutilisées pour économiser l'espace du VPS
            docker image prune -f
